<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniConnect - Music Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>MiniConnect</h1>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>

        <!-- Server Configuration -->
        <div class="config-section" id="configSection">
            <h3>Server Connection</h3>
            <div class="input-group">
                <input 
                    type="text" 
                    id="serverInput" 
                    placeholder="Server IP (e.g., 192.168.1.100:3000)" 
                    value="localhost:3000"
                >
                <button id="connectBtn" class="btn-primary">Connect</button>
            </div>
        </div>

        <!-- Now Playing Section -->
        <div class="now-playing" id="nowPlayingSection" style="display: none;">
            <!-- Playlist Selector -->
            <div class="playlist-section">
                <label for="playlistSelect">Playlist:</label>
                <select id="playlistSelect" class="playlist-select">
                    <option value="">Select a playlist...</option>
                </select>
                <button id="playPlaylistBtn" class="btn-small">Play</button>
            </div>

            <!-- Album Art Placeholder -->
            <div class="album-art">
                <svg width="100%" height="100%" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="#1DB954" stroke-width="2"/>
                    <circle cx="100" cy="100" r="50" fill="none" stroke="#1DB954" stroke-width="1"/>
                    <circle cx="100" cy="100" r="10" fill="#1DB954"/>
                    <circle cx="100" cy="100" r="6" fill="#191414"/>
                </svg>
            </div>

            <!-- Song Info -->
            <div class="song-info">
                <h2 id="songTitle" class="song-title">No song playing</h2>
                <p id="artistName" class="artist-name">Unknown artist</p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time" id="duration">0:00</span>
            </div>

            <!-- Playback Status -->
            <div class="playback-status" id="playbackStatus">▶ Playing</div>

            <!-- Controls -->
            <div class="controls">
                <button id="prevBtn" class="control-btn" title="Previous">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 4h2v16H6V4zm3.5 8l8.5 6V6z"/>
                    </svg>
                </button>

                <button id="playPauseBtn" class="control-btn play-pause" title="Play/Pause">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="currentColor">
                        <path d="M12 8v32l24-16z" class="play-icon"/>
                        <g class="pause-icon" style="display: none;">
                            <rect x="10" y="8" width="6" height="32"/>
                            <rect x="24" y="8" width="6" height="32"/>
                        </g>
                    </svg>
                </button>

                <button id="nextBtn" class="control-btn" title="Next">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 4v16h2V4h-2zm-8 8l8-6v12z"/>
                    </svg>
                </button>
            </div>

            <!-- Volume Control -->
            <div class="volume-section">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="volume-icon">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.26 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
                <input 
                    type="range" 
                    id="volumeSlider" 
                    class="volume-slider" 
                    min="0" 
                    max="100" 
                    value="50"
                >
                <span id="volumeValue" class="volume-value">50%</span>
            </div>

            <!-- Reconnect message -->
            <div id="reconnectMessage" class="reconnect-message" style="display: none;">
                Connection lost. Reconnecting...
            </div>

            <!-- More Controls -->
            <div class="more-controls">
                <button id="shuffleBtn" class="control-btn small" title="Shuffle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10.59 9.38L6.12 4.9 4 6.99 9.46 12.45 4 17.91 6.04 20 10.59 15.45 15.04 20 17.17 17.88 12.71 13.42 17.17 8 15.04 6 10.59 9.38M19 8.5l-2.5 2.5h-1l3.5-3.5H22v5h-2.5V8.5h-0.5M19 15.5l-2.5 2.5h-1l3.5-3.5H22v5h-2.5v-2.5h-0.5z"/>
                    </svg>
                </button>

                <button id="repeatBtn" class="control-btn small" title="Repeat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                    </svg>
                </button>

                <button id="likeBtn" class="control-btn small" title="Like">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </button>

                <button id="queueBtn" class="control-btn small" title="Queue">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.64-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Disconnected Message -->
        <div id="disconnectedMessage" class="disconnected-message">
            <p>Not connected to server</p>
        </div>
    </div>

    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
