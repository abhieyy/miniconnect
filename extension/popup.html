<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniConnect Extension Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63);
            color: #ffffff;
            padding: 0;
        }

        .container {
            padding: 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #1DB954, #1ed760);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #b3b3b3;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .setup-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b3b3b3;
        }

        input {
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #1DB954;
            background: rgba(255, 255, 255, 0.12);
        }

        input::placeholder {
            color: #666666;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1DB954, #1ed760);
            color: #000000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(29, 185, 84, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        .status-message.success {
            background: rgba(29, 185, 84, 0.15);
            border: 1px solid rgba(29, 185, 84, 0.3);
            color: #1DB954;
            display: block;
        }

        .status-message.error {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            display: block;
        }

        .info-section {
            background: rgba(33, 150, 243, 0.1);
            border-left: 3px solid #2196F3;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            margin-top: 20px;
        }

        .info-section h3 {
            font-size: 13px;
            margin-bottom: 8px;
            color: #2196F3;
        }

        .info-section p {
            color: #b3b3b3;
            margin-bottom: 6px;
        }

        .info-section code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #1ed760;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 MiniConnect</h1>
        <p class="subtitle">YouTube Music Remote Control</p>

        <div class="setup-section">
            <div class="input-group">
                <label for="serverUrl">Server Address</label>
                <input 
                    type="text" 
                    id="serverUrl" 
                    placeholder="e.g., 192.168.1.100:3000"
                    value="http://localhost:3000"
                >
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="saveBtn">Save & Test</button>
            <button class="btn-secondary" id="resetBtn">Reset</button>
        </div>

        <div class="status-message" id="statusMessage"></div>

        <div class="info-section">
            <h3>ℹ️ How to Use</h3>
            <p><strong>1.</strong> Install the MiniConnect server on your laptop</p>
            <p><strong>2.</strong> Enter your server IP/port above</p>
            <p><strong>3.</strong> Keep YouTube Music open in this browser</p>
            <p><strong>4.</strong> Open the mobile app and connect to the same server</p>
            <p><strong>5.</strong> Control playback from your phone!</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
